syntax = "proto3";
package PbApp;

enum PlotType {
  UNKNOWN    = 0;
  LINE       = 1;
  SCATTER    = 2;
}

message Size {
  double w = 1;
  double h = 2;
}

message GraphElement {
  string label   = 1;
  PlotType type  = 2;
  string xField  = 3;
  string yField  = 4;
  uint32 color   = 5;
  int32 axisX    = 6;
  int32 axisY    = 7;
}

message Graph {
  string            id          = 1;
  string            title       = 2;
  repeated string   tags        = 3;
  
  repeated GraphElement signals = 4;
  repeated string otherElements = 5;
  bool              hasTooltip  = 6;
  
  string            author      = 7;
  int32             implotFlags = 8;
  int32             axisFlags   = 9;
}

message GridPlot {
  string                   id     = 1;
  Size                     size   = 2;
  int32                    flags  = 3;
  repeated string          graphID  = 4;
  string                   name   = 5;
}

message CustomPage {
  string                 id           = 1;
  string                 name         = 2;
  Size                   size         = 3;
  string                 author       = 4;
  repeated int32         gridCells    = 5;
  repeated string        gridPlotID   = 6;
}

message PresetMappings {
  map<string, Graph>     plot_configs    = 1;
  map<string, GridPlot>  subplot_configs = 2;
  map<string, CustomPage> preset_configs = 3;
}

